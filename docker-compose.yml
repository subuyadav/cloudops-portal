version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: cloudops-postgres

    restart: always

    environment:
      POSTGRES_USER: cloudadmin
      POSTGRES_PASSWORD: Cloud123
      POSTGRES_DB: cloudopsdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
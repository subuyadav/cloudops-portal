{% extends "base.html" %}

{% block title %}Audit Logs{% endblock %}

{% block content %}

<h2 class="mb-4">Audit Logs</h2>

<div class="card shadow">

    <div class="card-body">

        <table class="table table-striped table-hover">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Module</th>
                    <th>Date & Time</th>

                </tr>

            </thead>

            <tbody>

                {% for log in logs %}

                <tr>

                    <td>{{ log.id }}</td>
                    <td>{{ log.username }}</td>
                    <td>{{ log.action }}</td>
                    <td>{{ log.module }}</td>
                    <td>{{ log.created_at.strftime("%d-%b-%Y %H:%M") }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
